<div class="notification-center">
  <!-- Notification Bell Icon -->
  <div class="notification-bell" (click)="toggleDropdown()">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
    <span *ngIf="unreadCount > 0" class="notification-badge">{{ unreadCount }}</span>
  </div>

  <!-- Notification Dropdown -->
  <div class="notification-dropdown" [class.show]="showDropdown" #notificationDropdown>
    <div class="notification-header">
      <h3>Notifications</h3>
      <button *ngIf="notifications.length > 0" class="clear-btn" (click)="clearAll($event)">Clear All</button>
    </div>

    <div class="notification-list">
      <div *ngIf="notifications.length === 0" class="empty-state">
        <p>No notifications yet</p>
      </div>

      <div *ngFor="let notification of notifications" class="notification-item" [class.unread]="!notification.read">
        <div class="notification-content" (click)="markAsRead(notification.id, $event)">
          <div class="notification-icon">
            <!-- default fell ion for all notifi -->
            <span class="material-icons">notifications</span>
          </div>
          <div class="notification-text">
            <h4>{{ notification.title }}</h4>
            <p>{{ notification.body }}</p>
            <span class="notification-time">{{ getTimeAgo(notification.timestamp) }}</span>
          </div>
        </div>
        <button class="delete-btn" (click)="deleteNotification(notification.id, $event)" title="Delete">
          ✕
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Overlay to close dropdown when clicking outside -->
<div *ngIf="showDropdown" class="notification-overlay" (click)="closeDropdown()"></div>
